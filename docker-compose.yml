services:
  postgres:
    image: postgres:16-alpine
    container_name: ${APP_NAME:-quickcart}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APP_NAME:-quickcart}-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Database Configuration
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      DIRECT_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      
      # Clerk Configuration
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY}
      NEXT_PUBLIC_CLERK_SIGN_IN_URL: ${NEXT_PUBLIC_CLERK_SIGN_IN_URL}
      NEXT_PUBLIC_CLERK_SIGN_UP_URL: ${NEXT_PUBLIC_CLERK_SIGN_UP_URL}
      
      # Stripe Configuration
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      
      # Cloudinary Configuration
      NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME: ${NEXT_PUBLIC_CLOUDINARY_CLOUD_NAME}
      
      # URLs
      FRONTEND_STORE_URL: ${FRONTEND_STORE_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      
      # App Configuration
      NODE_ENV: production

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.quickcart.rule=Host(`ecom-admin.duckdns.org`)"
      - "traefik.http.routers.quickcart.entrypoints=websecure"
      - "traefik.http.routers.quickcart.tls=true"
      - "traefik.http.routers.quickcart.tls.certresolver=cert-resolver"
      - "traefik.http.services.quickcart.loadbalancer.server.port=3000"
      - "traefik.docker.network=cas-network"

    expose:
      - 3000"
    networks:
      - app-network
      - cas-network

volumes:
  postgres_data:

networks:
  app-network:
    driver: bridge

  cas-network:
    external: true